# Upstream configuration mapping directly to PM2 Node process
upstream trinetra_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# 1. Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name trinetradigitalsolution.com www.trinetradigitalsolution.com;
    return 301 https://$host$request_uri;
}

# 2. Production HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name trinetradigitalsolution.com www.trinetradigitalsolution.com;

    # SSL Certificates Configuration (Certbot Paths)
    ssl_certificate /etc/letsencrypt/live/trinetradigitalsolution.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trinetradigitalsolution.com/privkey.pem;
    
    # Secure SSL Protocols and Ciphers
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    
    # SSL Session Optimization
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Compression Configuration (Gzip)
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json;
    gzip_disable "MSIE [1-6]\.";

    # Client Request Security Limits
    client_max_body_size 10M;

    # Root Directory Configuration
    root /var/www/trinetra/dist;
    index index.html;

    # 3. Direct Static Asset Serving (High-Performance Caching)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
        try_files $uri =404;
    }

    # 4. SPA Frontend Fallback Handler
    location / {
        try_files $uri $uri/ /index.html;
        
        # Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' https: data: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; connect-src 'self' https:;" always;
    }

    # 5. Reverse Proxy for API Routes
    location /api/ {
        proxy_pass http://trinetra_backend;
        
        # Proxy Headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Buffer and Timing Limits
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }
}
