<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: warm off-white (matches site bg #F9F8F5) -->
  <rect width="512" height="512" rx="96" fill="#F9F8F5"/>

  <!-- Triangle outline — centered, generous padding -->
  <!-- Points: top-center (256,88), bottom-left (96,424), bottom-right (416,424) -->
  <polygon
    points="256,88 96,424 416,424"
    stroke="#18170F"
    stroke-width="20"
    stroke-linejoin="round"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Inner network lines — dashed, subtle -->
  <line x1="256" y1="176" x2="156" y2="342" stroke="#18170F" stroke-width="8" stroke-dasharray="10 14" stroke-linecap="round" opacity="0.35"/>
  <line x1="256" y1="176" x2="356" y2="342" stroke="#18170F" stroke-width="8" stroke-dasharray="10 14" stroke-linecap="round" opacity="0.35"/>
  <line x1="156" y1="342" x2="356" y2="342" stroke="#18170F" stroke-width="8" stroke-dasharray="10 14" stroke-linecap="round" opacity="0.35"/>

  <!-- Copper accent dot — top node (brand signature) -->
  <circle cx="256" cy="176" r="22" fill="#BF7340"/>

  <!-- Corner dots — bottom two nodes -->
  <circle cx="156" cy="342" r="14" fill="#18170F"/>
  <circle cx="356" cy="342" r="14" fill="#18170F"/>
</svg>
